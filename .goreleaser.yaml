# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: codeforge

before:
  hooks:
    - go mod tidy

builds:
  - id: codeforge
    main: ./cmd/codeforge
    binary: codeforge
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.ProjectVersion={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  # Optional lean build without glamour (publish as codeforge-plain if desired)
  - id: codeforge-plain
    main: ./cmd/codeforge
    binary: codeforge
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=plainmd
    ldflags:
      - -s -w
      - -X main.ProjectVersion={{.Version}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    builds: [codeforge]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: plain
    builds: [codeforge-plain]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_plain"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: NanoMindExplorer
      name: homebrew-tap
    ids: [default]
    homepage: "https://github.com/NanoMindExplorer/codeforge"
    description: "Terminal AI coding companion — multi-provider agent + GitHub"
    license: "Apache-2.0"
    install: |
      bin.install "codeforge"
    test: |
      assert_match version.to_s, shell_output("#{bin}/codeforge version")
    skip_upload: auto

release:
  github:
    owner: NanoMindExplorer
    name: codeforge
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./install.sh
    - glob: ./Formula/codeforge.rb
